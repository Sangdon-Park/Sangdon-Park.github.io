name: Sync grader secret once

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Copy grader secrets to private submission repo
        env:
          DEST_REPO: Sangdon-Park/tabular-ml-challenge-submit
          TRANSFER_TOKEN: ${{ secrets.PRIVATE_REPO_SECRET_SYNC_TOKEN }}
          GRADER_DATA_B64: ${{ secrets.GRADER_DATA_B64 }}
          GRADER_DATA_B64_1: ${{ secrets.GRADER_DATA_B64_1 }}
          GRADER_DATA_B64_2: ${{ secrets.GRADER_DATA_B64_2 }}
          GRADER_DATA_B64_3: ${{ secrets.GRADER_DATA_B64_3 }}
          GRADER_DATA_B64_4: ${{ secrets.GRADER_DATA_B64_4 }}
          GRADER_DATA_B64_5: ${{ secrets.GRADER_DATA_B64_5 }}
        run: |
          python -m pip install --quiet pynacl
          python - <<'PY'
          import base64
          import json
          import os
          import urllib.error
          import urllib.request

          from nacl import encoding, public

          api = "https://api.github.com"
          repo = os.environ["DEST_REPO"]
          token = os.environ["TRANSFER_TOKEN"]
          names = [
              "GRADER_DATA_B64",
              "GRADER_DATA_B64_1",
              "GRADER_DATA_B64_2",
              "GRADER_DATA_B64_3",
              "GRADER_DATA_B64_4",
              "GRADER_DATA_B64_5",
          ]

          def request(method, url, payload=None):
              body = None if payload is None else json.dumps(payload).encode("utf-8")
              req = urllib.request.Request(
                  url,
                  data=body,
                  method=method,
                  headers={
                      "Accept": "application/vnd.github+json",
                      "Authorization": f"Bearer {token}",
                      "Content-Type": "application/json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "User-Agent": "grader-secret-sync",
                  },
              )
              try:
                  with urllib.request.urlopen(req) as response:
                      data = response.read().decode("utf-8")
                      return json.loads(data) if data else None
              except urllib.error.HTTPError as exc:
                  details = exc.read().decode("utf-8", errors="replace")
                  raise SystemExit(f"GitHub API {exc.code}: {details}") from exc

          key = request("GET", f"{api}/repos/{repo}/actions/secrets/public-key")
          public_key = public.PublicKey(key["key"].encode("utf-8"), encoding.Base64Encoder())
          sealed_box = public.SealedBox(public_key)

          copied = []
          for name in names:
              value = os.environ.get(name)
              if not value:
                  continue
              encrypted = base64.b64encode(sealed_box.encrypt(value.encode("utf-8"))).decode("utf-8")
              request(
                  "PUT",
                  f"{api}/repos/{repo}/actions/secrets/{name}",
                  {"encrypted_value": encrypted, "key_id": key["key_id"]},
              )
              copied.append(name)

          if not copied:
              raise SystemExit("No GRADER_DATA_B64 secrets were available to copy")
          print("copied secret names:", ", ".join(copied))
          PY
