name: Sync GitHub Traffic

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Collect traffic metrics
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/update_github_traffic.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/github-traffic-history.json data/github-traffic-latest.json data/github-traffic-summary.md
          if git diff --cached --quiet; then
            echo "No traffic updates to commit."
            exit 0
          fi
          git commit -m "chore: update github traffic snapshot"
          git push
