name: Score Hackathon submission PR

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - "hackathon/submissions/*.csv"

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: hackathon-submission-grader-${{ github.repository }}
  cancel-in-progress: false

jobs:
  score:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted grader
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r hackathon_admin/requirements.txt

      - name: Download submitted CSV from PR head
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          python hackathon_admin/scripts/download_pr_submission.py
          --repo "${{ github.repository }}"
          --pr "${{ github.event.pull_request.number }}"
          --head-sha "${{ github.event.pull_request.head.sha }}"
          --submission-root hackathon/submissions
          --out hackathon_admin/incoming/submission.csv
          --meta-out hackathon_admin/incoming/meta.json

      - name: Check daily submission limit
        id: limit
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          python hackathon_admin/scripts/submission_limit.py check
          --repo "${{ github.repository }}"
          --config hackathon_admin/competition/config.json
          --meta hackathon_admin/incoming/meta.json
          --out-json hackathon_admin/incoming/limit.json
          --out-comment hackathon_admin/incoming/comment.md

      - name: Restore grader payload
        if: steps.limit.outcome == 'success'
        env:
          GRADER_DATA_B64: ${{ secrets.GRADER_DATA_B64 }}
          GRADER_DATA_B64_1: ${{ secrets.GRADER_DATA_B64_1 }}
          GRADER_DATA_B64_2: ${{ secrets.GRADER_DATA_B64_2 }}
          GRADER_DATA_B64_3: ${{ secrets.GRADER_DATA_B64_3 }}
          GRADER_DATA_B64_4: ${{ secrets.GRADER_DATA_B64_4 }}
          GRADER_DATA_B64_5: ${{ secrets.GRADER_DATA_B64_5 }}
        run: python hackathon_admin/scripts/write_secret_answers.py --output hackathon_admin/runtime/grader.csv

      - name: Score submission
        if: steps.limit.outcome == 'success'
        id: score
        continue-on-error: true
        run: >
          python hackathon_admin/scripts/grade_submission_file.py
          --submission hackathon_admin/incoming/submission.csv
          --answers hackathon_admin/runtime/grader.csv
          --config hackathon_admin/competition/config.json
          --meta hackathon_admin/incoming/meta.json
          --score-split final
          --out-json hackathon_admin/incoming/score.json
          --out-comment hackathon_admin/incoming/comment.md
          --fail-on-invalid

      - name: Record submission attempt
        if: always() && steps.limit.outcome == 'success' && steps.score.outcome != 'skipped'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          python hackathon_admin/scripts/submission_limit.py record
          --repo "${{ github.repository }}"
          --pr "${{ github.event.pull_request.number }}"
          --head-sha "${{ github.event.pull_request.head.sha }}"
          --config hackathon_admin/competition/config.json
          --meta hackathon_admin/incoming/meta.json
          --score-json hackathon_admin/incoming/score.json
          --out-json hackathon_admin/incoming/limit-record.json

      - name: Publish valid submission
        if: steps.limit.outcome == 'success' && steps.score.outcome == 'success'
        run: |
          set -euo pipefail
          git pull --ff-only origin "${{ github.event.pull_request.base.ref }}"
          python - <<'PY'
          import json
          import shutil
          from pathlib import Path, PurePosixPath

          meta = json.loads(Path("hackathon_admin/incoming/meta.json").read_text(encoding="utf-8"))
          filename = PurePosixPath(meta["filename"])
          if filename.parent != PurePosixPath("hackathon/submissions") or filename.suffix.lower() != ".csv":
              raise SystemExit(f"Unexpected submission path: {filename}")

          target = Path(*filename.parts)
          target.parent.mkdir(parents=True, exist_ok=True)
          shutil.copyfile("hackathon_admin/incoming/submission.csv", target)
          print(f"Prepared {target}")
          PY
          python hackathon_admin/scripts/build_leaderboard.py \
            --answers hackathon_admin/runtime/grader.csv \
            --config hackathon_admin/competition/config.json \
            --score-split final \
            --out hackathon/data/leaderboard.json
          git add hackathon/submissions hackathon/data/leaderboard.json
          if git diff --cached --quiet -- hackathon/submissions hackathon/data/leaderboard.json; then
            echo "" >> hackathon_admin/incoming/comment.md
            echo "공개 순위표에 이미 같은 제출 파일과 점수가 반영되어 있습니다." >> hackathon_admin/incoming/comment.md
            exit 0
          fi
          TEAM="$(python -c "import json; print(json.load(open('hackathon_admin/incoming/meta.json', encoding='utf-8'))['team'])")"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Record Hackathon submission: ${TEAM}"
          git push origin HEAD:${{ github.event.pull_request.base.ref }}
          echo "" >> hackathon_admin/incoming/comment.md
          echo "공개 순위표에 자동 반영되도록 제출 CSV와 순위표를 함께 갱신했습니다. PR 전체를 merge하지 않고 검증된 CSV 하나만 반영했습니다." >> hackathon_admin/incoming/comment.md

      - name: Comment on pull request
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.existsSync("hackathon_admin/incoming/comment.md")
              ? fs.readFileSync("hackathon_admin/incoming/comment.md", "utf8")
              : "### Submission score\n\nThe grader could not read or score this submission. Check the workflow logs for details.";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

      - name: Close published pull request
        if: steps.limit.outcome == 'success' && steps.score.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              state: "closed"
            });

      - name: Fail limited or invalid submission
        if: steps.limit.outcome == 'failure' || steps.score.outcome == 'failure'
        run: exit 1
