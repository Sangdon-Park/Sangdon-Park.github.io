name: Publish Hackathon leaderboard

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "hackathon/data/leaderboard.json"
      - "hackathon_admin/competition/config.json"
      - "hackathon_admin/scripts/**"
      - ".github/workflows/publish-hackathon-leaderboard.yml"

permissions:
  contents: write

jobs:
  leaderboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r hackathon_admin/requirements.txt

      - name: Normalize public leaderboard JSON
        run: >
          python hackathon_admin/scripts/normalize_leaderboard.py
          --config hackathon_admin/competition/config.json
          --out hackathon/data/leaderboard.json

      - name: Commit leaderboard
        run: |
          if git diff --quiet -- hackathon/data/leaderboard.json; then
            echo "Leaderboard unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hackathon/data/leaderboard.json
          git commit -m "Update Hackathon leaderboard"
          git push
